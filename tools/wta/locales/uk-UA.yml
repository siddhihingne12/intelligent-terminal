# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "щойно"
time.minute_singular: "1 хвилину тому"
time.minutes_other: "%{count} хвилин тому"
time.hour_singular: "1 годину тому"
time.hours_other: "%{count} годин тому"
time.day_singular: "1 день тому"
time.days_other: "%{count} днів тому"
