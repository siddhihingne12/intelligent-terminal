name: "Bug report 🐛"
description: Report errors or unexpected behavior
labels: [Issue-Bug, Needs-Triage]
type: Bug
body:
- type: markdown
  attributes:
    value: |
      Please make sure to [search for existing issues](https://github.com/microsoft/intelligent-terminal/issues) before filing a new one!

      If this is an application crash, please provide a [Feedback Hub](https://aka.ms/intelligent-terminal-feedback) submission link so we can find your diagnostic data on the backend. Use the appropriate category and choose "Share My Feedback" after submission to get the link.

- type: input
  attributes:
    label: Intelligent Terminal version
    placeholder: "1.21.2701.0"
    description: |
      You can copy the version number from the About dialog. Open the About dialog by opening the menu with the "V" button (to the right of the "+" button that opens a new tab) and choosing About from the end of the list.
  validations:
    required: true
    
- type: input
  attributes:
    label: Windows build number
    placeholder: "10.0.22621.0"
    description: |
      Please run `ver` or `[Environment]::OSVersion`.
  validations:
    required: false

- type: dropdown
  attributes:
    label: Terminal Profile
    description: Which terminal profile were you using when the issue occurred?
    options:
      - PowerShell
      - Windows PowerShell
      - Command Prompt
      - WSL
      - Git Bash
      - Azure Cloud Shell
      - Other
  validations:
    required: false

- type: textarea
  attributes:
    label: Other Software
    description: If you're reporting a bug about our interaction with other software, what software? What versions?
    placeholder: |
      vim 9.1 (inside WSL)
      OpenSSH_for_Windows_9.5p1
      My Cool Application v0.4 (include a code snippet if it would help!)
  validations:
    required: false

- type: textarea
  attributes:
    label: Steps to reproduce
    placeholder: Tell us the steps required to trigger your bug.
  validations:
    required: true

- type: dropdown
  attributes:
    label: Reproducibility
    description: Does this happen consistently?
    options:
      - Always
      - Sometimes
      - Only once
  validations:
    required: fa

- type: textarea
  attributes:
    label: Expected Behavior
    description: If you want to include screenshots, paste them into the markdown editor below.
    placeholder: What were you expecting?
  validations:
    required: false

- type: textarea
  attributes:
    label: Describe what actually happened. Include any error messages or screenshots if applicable.
    placeholder: What happened instead?
  validations:
    required: true
