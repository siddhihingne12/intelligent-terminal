# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "только что"
time.minute_singular: "1 минуту назад"
time.minutes_other: "%{count} минут назад"
time.hour_singular: "1 час назад"
time.hours_other: "%{count} часов назад"
time.day_singular: "1 день назад"
time.days_other: "%{count} дней назад"
