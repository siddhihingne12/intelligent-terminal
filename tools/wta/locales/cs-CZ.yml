# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "právě teď"
time.minute_singular: "před 1 minutou"
time.minutes_other: "před %{count} minutami"
time.hour_singular: "před 1 hodinou"
time.hours_other: "před %{count} hodinami"
time.day_singular: "před 1 dnem"
time.days_other: "před %{count} dny"
