time.minute_singular: "преди 1 минута"
time.minutes_other: "преди %{count} минути"
time.hour_singular: "преди 1 час"
time.hours_other: "преди %{count} часа"
time.day_singular: "преди 1 ден"
time.days_other: "преди %{count} дни"

