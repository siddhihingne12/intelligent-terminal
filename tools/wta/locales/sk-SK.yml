# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "práve teraz"
time.minute_singular: "pred 1 minútou"
time.minutes_other: "pred %{count} minútami"
time.hour_singular: "pred 1 hodinou"
time.hours_other: "pred %{count} hodinami"
time.day_singular: "pred 1 dňom"
time.days_other: "pred %{count} dňami"
