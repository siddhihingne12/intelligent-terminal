# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "pravkar"
time.minute_singular: "pred 1 minuto"
time.minutes_other: "pred %{count} minutami"
time.hour_singular: "pred 1 uro"
time.hours_other: "pred %{count} urami"
time.day_singular: "pred 1 dnevom"
time.days_other: "pred %{count} dnevi"
