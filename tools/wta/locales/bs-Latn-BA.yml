# ── Relative time + date formatting (src/ui/agents_view.rs) ─────────────────
# rust-i18n has no CLDR plural support; Rust selects singular vs. other.
# For Slavic 3-form locales, _other uses the many form (natural for 5+).
# %{count} = numeric count (interpolated).
time.just_now: "upravo sada"
time.minute_singular: "prije 1 minute"
time.minutes_other: "prije %{count} minuta"
time.hour_singular: "prije 1 sat"
time.hours_other: "prije %{count} sati"
time.day_singular: "prije 1 dan"
time.days_other: "prije %{count} dana"
